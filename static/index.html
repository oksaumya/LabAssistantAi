<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Lab Assistant</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="app">
        <header>
            <h1>AI Lab Assistant</h1>
            <p>Advanced AI & Deep Learning Lab — Room 304, Block B</p>
        </header>
        <div class="chat-container" id="chatContainer">
            <div class="message assistant">
                <div class="bubble">
                    Hello! I'm the AI Lab Assistant for the CSE department. Ask me anything about lab timings, coursework, hardware, policies, or troubleshooting.
                </div>
            </div>
        </div>
        <div class="input-area">
            <input type="text" id="userInput" placeholder="Ask a question about the lab..." autocomplete="off">
            <button id="sendBtn" onclick="sendMessage()">Send</button>
        </div>
    </div>
    <script src="/static/script.js"></script>
</body>
</html>
